services:
  - type: web
    name: agentstore-api
    runtime: node
    plan: free
    region: ohio
    branch: main
    buildCommand: "pnpm install && pnpm build"
    startCommand: "pnpm start"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVICE_MODE
        value: web,worker
      - key: NEXT_PUBLIC_APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agentstore-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://agentstore-api.onrender.com

databases:
  - name: agentstore-db
    plan: free
    region: ohio
    databaseName: agentstore
    user: agentstore_user
